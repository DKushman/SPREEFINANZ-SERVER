server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Keep public URLs extensionless.
    if ($request_uri = "/index.html") {
        return 301 /;
    }
    if ($request_uri ~ "^(.+)\\.html(\\?.*)?$") {
        return 301 $1$2;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
