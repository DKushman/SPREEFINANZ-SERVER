server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Keep public URLs extensionless.
    if ($request_uri = "/index.html") {
        return 301 /;
    }
    if ($request_uri ~ "^(.+)\\.html(\\?.*)?$") {
        return 301 $1$2;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;

        sub_filter '</head>' '<script src="/assets/local-head/ga-bootstrap.js"></script></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }
}
