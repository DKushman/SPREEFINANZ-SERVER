services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - proxy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - devdesign_private
      - preise_private
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  devdesign_frontend:
    build:
      context: ../apps/devdesign/frontend
      dockerfile: Dockerfile
    networks:
      - proxy
      - devdesign_private
    restart: unless-stopped

  devdesign_api:
    build:
      context: ../apps/devdesign/backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DEVDESIGN_DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proxy
      - devdesign_private
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  preise_frontend:
    build:
      context: ../apps/preiseberechnen/frontend
      dockerfile: Dockerfile
    networks:
      - proxy
      - preise_private
    restart: unless-stopped

  preise_admin_frontend:
    build:
      context: ../apps/preiseberechnen/admin-frontend
      dockerfile: Dockerfile
    networks:
      - proxy
      - preise_private
    restart: unless-stopped

  preise_api:
    build:
      context: ../apps/preiseberechnen/backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${PREISE_DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proxy
      - preise_private
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  proxy:
  devdesign_private:
  preise_private:

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
